[package]
name = "lores-p2panda"
version = "0.15.4"
edition = "2021"
publish = false

[dependencies]
p2panda-net = { git = "https://github.com/p2panda/p2panda", rev = "671ed657a3e0a0a8c43d06f2f09fb19ef86c9b99" }
p2panda-core = { git = "https://github.com/p2panda/p2panda", rev = "671ed657a3e0a0a8c43d06f2f09fb19ef86c9b99" }
p2panda-store = { git = "https://github.com/p2panda/p2panda", rev = "671ed657a3e0a0a8c43d06f2f09fb19ef86c9b99", features = ["sqlite"] }
p2panda-discovery = { git = "https://github.com/p2panda/p2panda", rev = "671ed657a3e0a0a8c43d06f2f09fb19ef86c9b99" }
p2panda-sync = { git = "https://github.com/p2panda/p2panda", rev = "671ed657a3e0a0a8c43d06f2f09fb19ef86c9b99" }
p2panda-stream = { git = "https://github.com/p2panda/p2panda", rev = "671ed657a3e0a0a8c43d06f2f09fb19ef86c9b99" }
serde = { version = "1.0.219", features = ["derive"] }
sqlx = { version = "0.8.6", features = [
  "runtime-tokio-native-tls",
  "sqlite",
  "chrono",
] }
thiserror = "2.0.17"
lazy_static = "1.5.0"
tokio = { version = "1.46.1", features = ["macros", "rt-multi-thread"] }
tokio-stream = "0.1.18"
hex = "0.4.3"
