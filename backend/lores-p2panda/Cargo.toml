[package]
name = "lores-p2panda"
version = "0.15.4"
edition = "2021"
publish = false

[dependencies]
p2panda-net = "0.5.1"
p2panda-core = "0.5.1"
p2panda-store = { version = "0.5.1", features = ["sqlite"] }
p2panda-discovery = "0.5.1"
p2panda-sync = "0.5.1"
p2panda-stream = "0.5.1"
serde = { version = "1.0.219", features = ["derive"] }
sqlx = { version = "0.8.6", features = [
  "runtime-tokio-native-tls",
  "sqlite",
  "chrono",
] }
thiserror = "2.0.17"
lazy_static = "1.5.0"
iroh = { version = "0.96.1", default-features = false }
tokio = { version = "1.46.1", features = ["macros", "rt-multi-thread"] }
tokio-stream = "0.1.18"
hex = "0.4.3"
