procs:
  # Both backends run in Docker so they get separate IPs on a bridge network,
  # enabling mDNS discovery and p2p UDP traffic between them.
  # Build the backend binary first: cd backend && cargo build
  backends:
    shell: "UID=$(id -u) GID=$(id -g) docker compose -f docker-compose-p2p-test.yml up --build"
    stop:
      send-keys: ["<C-c>"]

  # Node 1 — http://lores.localhost:5173 (frontend) / http://lores.localhost:8200 (backend)
  frontend-1:
    shell: "npm run dev -- --port 5173"
    cwd: "./frontend"

  # Node 2 — http://lores2.localhost:5174 (frontend) / http://lores2.localhost:8201 (backend)
  frontend-2:
    shell: "VITE_API_HOST=http://lores2.localhost:8201/ npm run dev -- --port 5174"
    cwd: "./frontend"
